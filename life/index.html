<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Game of Life | Arcade</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/5.0.0/normalize.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Serif:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;600&family=Lora:ital,wght@0,400;0,600;1,400&family=Ubuntu:wght@400;700&family=VT323&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="../assets/Farshad-Ghorbani.svg">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <link rel="stylesheet" href="../styles/style.css">
  <script>
    (function () {
      try {
        var t = localStorage.getItem('theme');
        if (t === 'dark' || t === 'light' || t === 'sepia') document.documentElement.setAttribute('data-theme', t);
        var f = localStorage.getItem('font');
        if (['vt323','serif','plex-serif','sans','ubuntu','atkinson'].indexOf(f) >= 0) document.documentElement.setAttribute('data-font', f);
      } catch (e) {}
    })();
  </script>
</head>

<body>
  <main class="page">
    <header class="page-header">
      <a href="../index.html" class="back-link">&larr; arcade</a>
      <h1>Game of Life</h1>
    </header>

    <div class="reader-controls">
      <div class="seg" data-control="theme" role="group" aria-label="Theme">
        <button type="button" data-value="light" title="Light">&#9728;</button>
        <button type="button" data-value="sepia" title="Sepia">&#9681;</button>
        <button type="button" data-value="dark"  title="Dark">&#9790;</button>
      </div>
      <div class="seg" data-control="font" role="group" aria-label="Font">
        <button type="button" data-value="vt323"      style="font-family:'VT323',monospace">Aa</button>
        <button type="button" data-value="serif"      style="font-family:'Lora',Georgia,serif">Aa</button>
        <button type="button" data-value="plex-serif" style="font-family:'IBM Plex Serif',Georgia,serif">Aa</button>
        <button type="button" data-value="sans"       style="font-family:'Inter',system-ui,sans-serif">Aa</button>
        <button type="button" data-value="ubuntu"     style="font-family:'Ubuntu',system-ui,sans-serif">Aa</button>
        <button type="button" data-value="atkinson"   style="font-family:'Atkinson Hyperlegible',system-ui,sans-serif">Aa</button>
      </div>
    </div>

    <div class="game-shell">
      <div class="game-status">
        <span><span class="stat-label">Generation</span><span id="gen">0</span></span>
        <span><span class="stat-label">Alive</span><span id="alive">0</span></span>
        <span><span class="stat-label">Speed</span><span id="speed-val">10</span>/s</span>
      </div>
      <canvas id="life" width="600" height="400" class="game-canvas"></canvas>
      <div class="game-controls">
        <button class="btn primary" id="play">Play</button>
        <button class="btn" id="step">Step</button>
        <button class="btn" id="random">Random</button>
        <button class="btn" id="clear">Clear</button>
      </div>
      <div class="game-controls" style="margin-top:6px">
        <label style="display:flex;align-items:center;gap:8px;font-size:.85em">
          Speed
          <input type="range" id="speed" min="1" max="60" value="10" />
        </label>
        <select id="preset" class="btn" style="padding:6px 10px">
          <option value="">Load preset...</option>
          <option value="glider">Glider</option>
          <option value="lwss">Lightweight spaceship</option>
          <option value="pulsar">Pulsar</option>
          <option value="r-pentomino">R-pentomino</option>
          <option value="acorn">Acorn</option>
          <option value="gosper">Gosper glider gun</option>
        </select>
      </div>
      <p class="game-help">Click / drag to paint cells &middot; P pause &middot; S step</p>
    </div>
  </main>

  <footer class="site-footer">
    Built by <a href="https://thefarshad.com">Farshad</a> &middot;
    <a href="https://github.com/the-farshad/arcade">source on GitHub</a>
  </footer>

  <script src="../scripts/theme.js"></script>
  <script src="./life.js"></script>
</body>

</html>
