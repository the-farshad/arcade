<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Arcade | Farshad Ghorbani</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/5.0.0/normalize.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Serif:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;600&family=Lora:ital,wght@0,400;0,600;1,400&family=Ubuntu:wght@400;700&family=VT323&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="./assets/Farshad-Ghorbani.svg">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <link rel="stylesheet" href="./styles/style.css">
  <script>
    (function () {
      try {
        var t = localStorage.getItem('theme');
        if (t === 'dark' || t === 'light' || t === 'sepia') document.documentElement.setAttribute('data-theme', t);
        var f = localStorage.getItem('font');
        if (['vt323','serif','plex-serif','sans','ubuntu','atkinson'].indexOf(f) >= 0) document.documentElement.setAttribute('data-font', f);
      } catch (e) {}
    })();
  </script>
</head>

<body>
  <main class="page">
    <header class="page-header">
      <a href="https://thefarshad.com" class="back-link">&larr; home</a>
      <h1>Arcade</h1>
    </header>

    <div class="reader-controls">
      <div class="seg" data-control="theme" role="group" aria-label="Theme">
        <button type="button" data-value="light" title="Light">&#9728;</button>
        <button type="button" data-value="sepia" title="Sepia">&#9681;</button>
        <button type="button" data-value="dark"  title="Dark">&#9790;</button>
      </div>
      <div class="seg" data-control="font" role="group" aria-label="Font">
        <button type="button" data-value="vt323"      title="VT323"                  style="font-family:'VT323',monospace">Aa</button>
        <button type="button" data-value="serif"      title="Lora"                   style="font-family:'Lora',Georgia,serif">Aa</button>
        <button type="button" data-value="plex-serif" title="IBM Plex Serif"         style="font-family:'IBM Plex Serif',Georgia,serif">Aa</button>
        <button type="button" data-value="sans"       title="Inter"                  style="font-family:'Inter',system-ui,sans-serif">Aa</button>
        <button type="button" data-value="ubuntu"     title="Ubuntu"                 style="font-family:'Ubuntu',system-ui,sans-serif">Aa</button>
        <button type="button" data-value="atkinson"   title="Atkinson Hyperlegible"  style="font-family:'Atkinson Hyperlegible',system-ui,sans-serif">Aa</button>
      </div>
    </div>

    <div class="cabinet-grid">
      <a class="cabinet" href="./snake/" data-game="snake">
        <span class="cab-glyph">&#11042;</span>
        <span class="cab-name">Snake</span>
        <span class="cab-hi" data-hi-key="arcade-snake-hi">hi: &mdash;</span>
      </a>
      <a class="cabinet" href="./pong/" data-game="pong">
        <span class="cab-glyph">&#9724;</span>
        <span class="cab-name">Pong</span>
        <span class="cab-hi" data-hi-key="arcade-pong-hi">hi: &mdash;</span>
      </a>
      <a class="cabinet" href="./2048/" data-game="2048">
        <span class="cab-glyph">2&#8201;0&#8201;4&#8201;8</span>
        <span class="cab-name">2048</span>
        <span class="cab-hi" data-hi-key="arcade-2048-hi">hi: &mdash;</span>
      </a>
      <a class="cabinet coming" href="#" aria-disabled="true">
        <span class="cab-glyph">&#9726;</span>
        <span class="cab-name">Breakout</span>
        <span class="cab-tag">soon</span>
      </a>
      <a class="cabinet coming" href="#" aria-disabled="true">
        <span class="cab-glyph">&#9632;</span>
        <span class="cab-name">Blocks</span>
        <span class="cab-tag">soon</span>
      </a>
      <a class="cabinet coming" href="#" aria-disabled="true">
        <span class="cab-glyph">&#9698;</span>
        <span class="cab-name">Tank</span>
        <span class="cab-tag">soon</span>
      </a>
      <a class="cabinet coming" href="#" aria-disabled="true">
        <span class="cab-glyph">&#9881;</span>
        <span class="cab-name">Game of Life</span>
        <span class="cab-tag">soon</span>
      </a>
    </div>
  </main>

  <footer class="site-footer">
    Built by <a href="https://thefarshad.com">Farshad</a> &middot;
    <a href="https://github.com/the-farshad/arcade">source on GitHub</a>
  </footer>

  <script src="./scripts/theme.js"></script>
  <script>
    // Show local high scores under each live cabinet
    document.querySelectorAll('.cab-hi[data-hi-key]').forEach(el => {
      try {
        const v = localStorage.getItem(el.dataset.hiKey);
        if (v) el.textContent = 'hi: ' + v;
      } catch (e) {}
    });
  </script>
</body>

</html>
